[build]
  # 构建命令
  command = "npm run build"
  # 发布目录
  publish = "docs/.vuepress/dist"

# Node.js 版本设置
[build.environment]
  NODE_VERSION = "18"

# 重定向规则 - 支持单页应用路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 头部设置 - 优化缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
